<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCR Histogram Lab</title>
    <link rel="stylesheet" href="style_histo.css" />
</head>

<body>
    <nav class="navbar">

        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="../template_matching/template.html">Template</a>
            <a href="../histogram/histogram.html">Histogram</a>
            <a href="../zoning/zoning.html">Zoning</a>
            <a href="../compare/compare.html">Compare</a>
            <a href="../manager/templates_manager.html">Manager</a>
        </div>
    </nav>

    <main class="wrap">
        <h1>Histogram </h1>

        <section class="row">
            <div class="panel">
                <h2>Draw input</h2>
                <canvas id="draw" width="160" height="160"></canvas>

                <div class="btns">
                    <button id="clearBtn">Clear</button>
                </div>

                <div class="controls">
                    <label>
                        Brush size: <span id="brushVal">7</span>
                        <input id="brushSize" type="range" min="4" max="18" value="7" />
                    </label>

                    <label>
                        Threshold: <span id="thrVal">20</span>
                        <input id="thr" type="range" min="0" max="255" value="20" />
                    </label>

                    <label>
                        Margin: <span id="marginVal">6</span>
                        <input id="margin" type="range" min="0" max="20" value="6" />
                    </label>

                    <label>
                        Binarization: <span id="postThrVal">128</span>
                        <input id="postThr" type="range" min="0" max="255" value="128" />
                    </label>
                </div>
            </div>

            <div class="panel">
                <h2>Output</h2>

                <div class="outLayout">

                    <div class="previewBlock">
                        <div class="label">28x28 preview</div>
                        <canvas id="preview" width="140" height="140"></canvas>
                    </div>


                    <div class="rowHistBlock">
                        <div class="label">Row histogram (28 bins)</div>
                        <canvas id="rowHist" width="170" height="170"></canvas>
                    </div>


                    <div class="colHistBlock">
                        <div class="label">Column histogram (28 bins)</div>
                        <canvas id="colHist" width="170" height="170"></canvas>
                    </div>


                    <div class="resultBlock">
                        <div class="label">Result</div>

                        <div class="resultBigWrap">
                            <div id="result" class="resultBig">—</div>
                        </div>

                        <div class="label">Top scores</div>
                        <ol id="scores"></ol>

                    </div>

                </div>

            </div>
        </section>

    </main>

    <script src="app_histo.js"></script>
    <script src="../navbar.js"></script>
</body>

</html>
