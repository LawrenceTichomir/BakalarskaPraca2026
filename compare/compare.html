<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCR Methods Comparison</title>
    <link rel="stylesheet" href="style_compare.css" />
</head>

<body>
    <nav class="navbar">

        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="../template_matching/template.html">Template</a>
            <a href="../histogram/histogram.html">Histogram</a>
            <a href="../zoning/zoning.html">Zoning</a>
            <a href="../compare/compare.html">Compare</a>
            <a href="../manager/templates_manager.html">Manager</a>
        </div>
    </nav>

    <main class="wrap">
        <h1>OCR Methods Comparison</h1>

        <section class="topSection">
            <div class="panel">
                <h2>Draw input</h2>
                <canvas id="draw" width="160" height="160"></canvas>

                <div class="btns">
                    <button id="clearBtn">Clear</button>
                </div>

                <div class="controls">
                    <label>
                        Brush size: <span id="brushVal">7</span>
                        <input id="brushSize" type="range" min="4" max="26" value="7" />
                    </label>

                    <label>
                        Threshold: <span id="thrVal">20</span>
                        <input id="thr" type="range" min="0" max="255" value="20" />
                    </label>

                    <label>
                        Margin: <span id="marginVal">6</span>
                        <input id="margin" type="range" min="0" max="20" value="6" />
                    </label>

                    <label>
                        Binarization: <span id="postThrVal">128</span>
                        <input id="postThr" type="range" min="0" max="255" value="128" />
                    </label>
                </div>
            </div>

            <div class="panel">
                <h2>Normalized input</h2>
                <canvas id="preview" width="280" height="280"></canvas>
            </div>
        </section>

        <section class="resultsGrid">
            <div class="panel">
                <h2>Template Matching</h2>
                <div id="templateResult" class="bigResult">—</div>
                <ol id="templateScores"></ol>
                <canvas id="templateBestCanvas" width="170" height="170"></canvas>
            </div>

            <div class="panel">
                <h2>Histogram Method</h2>
                <div id="histResult" class="bigResult">—</div>
                <ol id="histScores"></ol>
                <canvas id="histRowCanvas" width="170" height="170"></canvas>
            </div>

            <div class="panel">
                <h2>Zoning Method</h2>
                <div id="zoneResult" class="bigResult">—</div>
                <ol id="zoneScores"></ol>
                <canvas id="zoneCanvas" width="170" height="170"></canvas>
            </div>
        </section>
    </main>

    <script src="app_compare.js"></script>
    <script src="../navbar.js"></script>
</body>

</html>
